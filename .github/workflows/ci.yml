name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo install flip-link
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo clippy --workspace --features efm32hg322-usb/dma -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - features: ""
            artifact-suffix: "fifo"
          - features: "--features efm32hg322-usb/dma"
            artifact-suffix: "dma"
    steps:
      - uses: actions/checkout@v4
      - run: cargo install flip-link

      - name: Build all binaries (release)
        run: cargo build --release --workspace ${{ matrix.features }}

      - name: Convert ELF to Intel HEX
        run: |
          OBJCOPY=$(find ~/.rustup -name llvm-objcopy -type f | head -1)
          mkdir -p artifacts
          for elf in target/thumbv6m-none-eabi/release/*; do
            if [ -f "$elf" ] && file "$elf" | grep -q "ELF"; then
              name="$(basename "$elf")-${{ matrix.artifact-suffix }}"
              "$OBJCOPY" -O ihex "$elf" "artifacts/${name}.hex"
            fi
          done

      # Upload each .hex as its own artifact for individual download.
      - name: Upload hex files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const {DefaultArtifactClient} = require('@actions/artifact');
            const client = new DefaultArtifactClient();
            const dir = 'artifacts';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.hex'));
            for (const file of files) {
              const name = file.replace('.hex', '');
              const filePath = path.join(dir, file);
              await client.uploadArtifact(name, [filePath], dir);
            }
