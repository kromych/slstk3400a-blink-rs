name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo install flip-link
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo clippy --workspace --features efm32hg322-usb/dma -- -D warnings

  build:
    name: Build (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - mode: fifo
            features: ""
          - mode: dma
            features: "--features efm32hg322-usb/dma"
    steps:
      - uses: actions/checkout@v4
      - run: cargo install flip-link

      - name: Build all binaries (release)
        run: cargo build --release --workspace ${{ matrix.features }}

      - name: Convert ELF to Intel HEX
        run: |
          OBJCOPY=$(find ~/.rustup -name llvm-objcopy -type f | head -1)
          mkdir -p hex
          for elf in target/thumbv6m-none-eabi/release/*; do
            if [ -f "$elf" ] && file "$elf" | grep -q "ELF"; then
              "$OBJCOPY" -O ihex "$elf" "hex/$(basename "$elf")-${{ matrix.mode }}.hex"
            fi
          done
          echo "### Firmware (${{ matrix.mode }})" >> "$GITHUB_STEP_SUMMARY"
          ls -lh hex/*.hex | awk '{print "- `" $NF "` — " $5}' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload hex files
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.mode }}
          path: hex/*.hex
          compression-level: 0

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [fmt, clippy, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all hex artifacts
        uses: actions/download-artifact@v4
        with:
          path: hex
          merge-multiple: true

      - name: Create release with hex files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" hex/*.hex \
            --title "$tag" \
            --generate-notes
